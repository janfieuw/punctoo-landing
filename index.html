<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punctoo – Eenvoudige arbeidstijdregistratie</title>
  <style>
    :root {
      --bg: #f3f3f0;
      --surface: #ffffff;
      --surface-soft: #ecece7;
      --text: #252521;
      --muted: #66665f;
      --green: #5d8f61;
      --green-dark: #4f7f53;
      --green-soft: #d9efcb;
      --yellow: #efbe00;
      --yellow-dark: #d2a700;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.07);
      --radius-xl: 30px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 110px;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(calc(100% - 40px), var(--max));
      margin: 0 auto;
    }

    .section {
      padding: 68px 0;
    }

    h1, h2, h3 {
      margin: 0 0 14px;
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: -0.045em;
    }

    h1 {
      font-size: clamp(1.6rem, 4.8vw, 2.7rem);
    }

    h2 {
      font-size: clamp(2rem, 3vw, 3.15rem);
    }

    p {
      margin: 0 0 16px;
      font-size: 1.03rem;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 24px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--yellow);
    }

    .btn-secondary {
      background: var(--green);
      color: white;
    }

    .hero {
      padding: 34px 0 20px;
    }

    .hero-card {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      background: var(--surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    /* ✅ AANGEPAST */
    .hero-media {
      min-height: 410px;
      position: relative;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
      display: block;
    }

    .hero-copy {
      padding: 40px 26px;
      background: var(--green);
      color: white;
    }

    .hero-price-line {
      font-size: clamp(1.5rem, 3.2vw, 2.15rem);
      font-weight: 900;
    }

    .hero-price-chip {
      background: #0f69a9;
      padding: 0 4px;
    }

    @media (max-width: 1080px) {
      .hero-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container site-header__inner">
    <img src="images/logo-punctooo.png" height="42">
    <a href="#contact" class="btn btn-primary">Start abonnement →</a>
  </div>
</header>

<main>

<section class="hero">
  <div class="container">
    <div class="hero-card">

      <!-- ✅ NIEUWE STRUCTUUR -->
      <div class="hero-media">
        <img src="images/image11.png" alt="Hero afbeelding" class="hero-img">
      </div>

      <div class="hero-copy">
        <p class="hero-price-line">
          Vanaf 01/01/2027 is elk bedrijf verplicht om arbeidstijd te registreren.
        </p>

        <p class="hero-price-line">
          Voor <span class="hero-price-chip">240 euro/jaar</span> ben je in orde.
        </p>

        <p>Prijs zonder btw.</p>
      </div>

    </div>
  </div>
</section>

</main>

</body>
</html>
